<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Danh sách tập</title>

<style>
body{
    font-family: Arial;
}

#episodes{
    display: grid;
    grid-template-columns: repeat(5, 80px);
    gap:10px;
}

.episode{
    padding:10px;
    background:#eee;
    border-radius:6px;
    text-align:center;
    cursor:pointer;
}

.episode:hover{
    background:#ccc;
}
</style>
</head>

<body>

<h2>Danh sách tập</h2>

<div id="episodes"></div>
<iframe id="player" width="800" height="450" allowfullscreen></iframe>
<!-- <video id="player" controls width="800"></video> -->

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const container = document.getElementById("episodes");

async function loadData(){

    const res = await fetch("https://ophim1.com/v1/api/phim/truc-ngoc");
    const data = await res.json();

    const streams = data.data.item.episodes[0].server_data;

    streams.forEach(ep => {

        const defaultStream = ep.link_embed;

        const div = document.createElement("div");
        div.className = "episode";
        div.innerText = "Tập " + ep.name;

        div.onclick = () => {
            play(defaultStream);
        };

        container.appendChild(div);

    });
    
        const div = document.createElement("div");
        div.className = "episode";
        div.innerText = "VTV1";

        div.onclick = () => {
            playHls('https://live-a.fptplay53.net/live/media/VTV1HD/live_hls_avc/index.m3u8');
        };

        const div = document.createElement("div");
        div.className = "episode";
        div.innerText = "VTV2";

        div.onclick = () => {
            playHls('https://live-a.fptplay53.net/live/media/VTV2HD/live_hls_avc/index.m3u8');
        };
    
        const div = document.createElement("div");
        div.className = "episode";
        div.innerText = "VTV3";

        div.onclick = () => {
            playHls('https://live-a.fptplay53.net/live/media/VTV3HD/live_hls_avc/index.m3u8');
        };
        container.appendChild(div);
}


function playHls(url){
    const video = document.getElementById("player");
    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }else{
        video.src = url;
    }
}
    
function play(url){

    const video = document.getElementById("player");
    video.src= url;
}

loadData();

</script>

</body>
</html>
