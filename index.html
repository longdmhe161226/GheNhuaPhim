const streams = data.sources[0].contents[0].streams;

// tạo list tập
streams.forEach(ep => {

    const defaultStream = ep.stream_links.find(s => !s.default);

    const div = document.createElement("div");
    div.className = "episode";
    div.innerText = "Tập " + ep.name;

div.onclick = () => {
    play(defaultStream.url)
};

    container.appendChild(div);

});

<video id="player" controls width="800"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

function play(url){

    const video = document.getElementById("player");

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }
}

</script>
