<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Danh sách tập</title>

<style>
body{
    font-family: Arial;
}

#episodes{
    display: grid;
    grid-template-columns: repeat(5, 80px);
    gap:10px;
}

.episode{
    padding:10px;
    background:#eee;
    border-radius:6px;
    text-align:center;
    cursor:pointer;
}

.episode:hover{
    background:#ccc;
}
</style>
</head>

<body>

<h2>Danh sách tập</h2>

<div id="episodes"></div>

<video id="player" controls width="800"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const container = document.getElementById("episodes");

async function loadData(){

    const res = await fetch("https://media.hth4nh.eu.org/ophim/detail/truc-ngoc");
    const data = await res.json();

    const streams = data.sources[0].contents[0].streams;

    streams.forEach(ep => {

        const defaultStream = ep.stream_links.find(s => !s.default);

        const div = document.createElement("div");
        div.className = "episode";
        div.innerText = "Tập " + ep.name;

        div.onclick = () => {
            play(defaultStream.url);
        };

        container.appendChild(div);

    });
}

function play(url){

    const video = document.getElementById("player");

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }else{
        video.src = url;
    }
}

loadData();

</script>

</body>
</html>
